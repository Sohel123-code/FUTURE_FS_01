  <!-- Custom CSS -->
  <style type="text/tailwindcss">
    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
    }

    /* Custom Colors */
    :root {
      --background: 240 10% 99%;
      --foreground: 222 47% 11%;
      --card: 0 0% 100%;
      --card-foreground: 222 47% 11%;
      --primary: 188 84% 48%;
      --primary-foreground: 0 0% 100%;
      --secondary: 35 92% 55%;
      --secondary-foreground: 222 47% 11%;
    }

    .dark {
      --background: 0 0% 0%;
      --foreground: 0 0% 100%;
      --card: 0 0% 5%;
      --card-foreground: 0 0% 100%;
      --primary: 188 78% 58%;
      --primary-foreground: 0 0% 0%;
      --secondary: 35 85% 65%;
      --secondary-foreground: 0 0% 0%;
    }

    .bg-background {
      background-color: hsl(var(--background));
    }

    .text-foreground {
      color: hsl(var(--foreground));
    }

    .bg-card {
      background-color: hsl(var(--card));
    }

    .text-card-foreground {
      color: hsl(var(--card-foreground));
    }

    .bg-primary {
      background-color: hsl(var(--primary));
    }

    .text-primary {
      color: hsl(var(--primary));
    }

    .text-primary-foreground {
      color: hsl(var(--primary-foreground));
    }

    .bg-secondary {
      background-color: hsl(var(--secondary));
    }

    .text-secondary {
      color: hsl(var(--secondary));
    }

    .text-secondary-foreground {
      color: hsl(var(--secondary-foreground));
    }

    /* Scroll reveal animation */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s cubic-bezier(0.17, 0.55, 0.55, 1);
    }

    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

    /* Certificate card fade-in — used instead of .reveal for dynamically-shown cards */
    @keyframes certCardFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .cert-card {
      animation: certCardFadeIn 0.5s ease forwards;
    }

    .nav-link::after {
      content: '';
      display: block;
      width: 0;
      height: 2px;
      background: hsl(var(--primary));
      transition: width .3s;
    }

    .nav-link:hover::after,
    .nav-link.active::after {
      width: 100%;
    }

    .hover-shadow:hover {
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      transform: translateY(-5px);
      transition: all 0.3s ease-in-out;
    }
  </style>

  <!-- Tailwind Script Config for Custom Animations -->
